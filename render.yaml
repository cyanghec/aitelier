services:
  - type: web
    name: aitelier-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # Set manually in Render dashboard — never commit this value
      - key: DATA_DIR
        value: /data       # Persistent disk mount path
    disk:
      name: aitelier-db
      mountPath: /data
      sizeGB: 1
